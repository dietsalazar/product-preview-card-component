<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <main>
    <div class="card">
      <div class="card-img">
        <img class="card-img-desktop" src="./images/image-product-desktop.jpg" alt="perfume bottle"/>
        <img class="card-img-mobile" src="./images/image-product-mobile.jpg" alt="perfume bottle" />
      </div>
      <div class="card-content">
        <span class="card-category">Perfume</span>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p>
        <div class="card-price">
          <span class="card-price-final">$149.99</span>
          <span class="card-price-original">$169.99</span>
        </div>
        <a href="#" class="card-btn"><img src="./images/icons8-cart-24.png" alt="shopping cart icon" />Add to Cart</a>
      </div>
    </div>
  </main>
  <footer class="attribution">
    <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/dietsalazar" target="_blank">Diet Salazar</a>.</p>
  </footer>
</body>
</html>
